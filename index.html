<!DOCTYPE html>
<html lang="en">
<head>

    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <h1>Simple Quiz</h1>

    </div>
<script src="script.js"></script>    
</body>
</html>
